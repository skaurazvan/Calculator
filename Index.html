.export-btn:active{background:#0f1a1a}
/* Regrind */

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── Helpers ── */
const HOURS   = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
const MINUTES = Array.from({length:60},(_,i)=>String(i).padStart(2,'0'));

function timeToSec(str) {
  if(!str) return null;
  const [h,m] = str.split(':').map(Number);
  if(isNaN(h)||isNaN(m)) return null;
  return h*3600+m*60;
}
function secTo24(s) {
  s=((s%86400)+86400)%86400;
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);
  return [h,m,sc].map(x=>String(x).padStart(2,'0')).join(':');
}
function fmtCountdown(s) {
  if(s<=0) return '00:00:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);
  return [h,m,sc].map(x=>String(x).padStart(2,'0')).join(':');
}
function fmtDur(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);
  if(h>0) return `${h}h ${m}m ${sc}s`;
  if(m>0) return `${m}m ${sc}s`;
  return `${sc}s`;
}
function getNowHHMM() {
  const n=new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
function getNowDisplay() {
  const n=new Date();
  return [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
function getNowSec() {
  const n=new Date(); return n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
}
function computeETA(startSec,startBoxes,nowSec,curBoxes) {
  let elapsed=nowSec-startSec;
  if(elapsed<=0) elapsed+=86400;
  const produced=startBoxes-curBoxes;
  if(produced<=0) return null;
  const rate=produced/elapsed;
  const ttf=curBoxes/rate;
  const fin=nowSec+ttf;
  return {finishSec:((fin%86400)+86400)%86400, finishTime:secTo24(fin), rate:rate*3600, ttf, overnight:fin>=86400};
}

const SK='prod_logs_v3';
function loadLogs(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):[]}catch{return[]}}
function saveLogs(l){try{localStorage.setItem(SK,JSON.stringify(l))}catch{}}

/* ── Countdown component — isolated so only it re-renders every second ── */
function Countdown({finishSec}) {
  const [remaining, setRemaining] = useState(()=>{
    const diff = finishSec - getNowSec();
    return diff < 0 ? diff + 86400 : diff;
  });

  useEffect(()=>{
    const t=setInterval(()=>{
      const diff = finishSec - getNowSec();
      // handle midnight rollover: if diff suddenly large and negative, it crossed midnight
      const adjusted = diff < -3600 ? diff + 86400 : diff;
      setRemaining(adjusted);
    },1000);
    return ()=>clearInterval(t);
  },[finishSec]);

  const isDone = remaining <= 0;
  const isUrgent = remaining > 0 && remaining <= 300; // last 5 min

  return (
    <span className={`countdown${isDone?' done':isUrgent?' urgent':''}`}>
      {isDone ? '✓ 00:00:00' : fmtCountdown(remaining)}
    </span>
  );
}

/* ── ETA Tab ── */
function ETATab() {
  const [logs,setLogs]             = useState(loadLogs);
  const [nowDisplay,setNow]        = useState(getNowDisplay);
  const [nowSec,setNowSec]         = useState(getNowSec);
  const [expanded,setExpanded]     = useState(null);
  const [newMachine,setNewMachine] = useState('');
  const [newBoxes1,setNewBoxes1]   = useState('');
  const [formErr,setFormErr]       = useState('');
  const [updInputs,setUpdInputs]   = useState({});

  useEffect(()=>{
    const t=setInterval(()=>{setNow(getNowDisplay());setNowSec(getNowSec());},1000);
    return ()=>clearInterval(t);
  },[]);
  useEffect(()=>saveLogs(logs),[logs]);

  function addMachine() {
    setFormErr('');
    const mid=newMachine.trim().toUpperCase();
    if(!mid) return setFormErr('⚠ Enter a machine number / ID');
    if(logs.find(l=>l.machineId===mid)) return setFormErr('⚠ Machine ID already exists');
    const b1=parseFloat(newBoxes1);
    if(isNaN(b1)||b1<=0) return setFormErr('⚠ Enter valid boxes remaining');
    const now=getNowSec();
    const label=getNowHHMM();
    const entry={id:Date.now(),machineId:mid,startSec:now,startBoxes:b1,
      history:[{label,boxes:b1,eta:null}],reason:null};
    setLogs(prev=>[entry,...prev]);
    setExpanded(entry.id);
    setNewMachine(''); setNewBoxes1('');
  }

  function doUpdate(id) {
    const val=parseFloat(updInputs[id]||'');
    if(isNaN(val)||val<0) return;
    const now=getNowSec();
    setLogs(prev=>prev.map(log=>{
      if(log.id!==id) return log;
      const eta=computeETA(log.startSec,log.startBoxes,now,val);
      return {...log,history:[...log.history,{label:getNowHHMM(),boxes:val,eta}]};
    }));
    setUpdInputs(prev=>({...prev,[id]:''}));
  }

  function setReason(id,r) {
    setLogs(prev=>prev.map(log=>{
      if(log.id!==id) return log;
      return {...log,reason:log.reason===r?null:r};
    }));
  }

  function removeLog(id) {
    setLogs(prev=>prev.filter(l=>l.id!==id));
    if(expanded===id) setExpanded(null);
  }

  function resetAll() {
    if(!window.confirm('Reset all machine logs? This cannot be undone.')) return;
    setLogs([]); setExpanded(null);
  }

  function getLatestETA(log) {
    for(let i=log.history.length-1;i>=0;i--)
      if(log.history[i].eta) return log.history[i].eta;
    return null;
  }

  return (
    <React.Fragment>
      <div className="card" style={{marginBottom:14}}>
        <div className="sec">Current Time</div>
        <div className="live-box">
          <span className="live-val">{nowDisplay}</span>
          <span className="live-badge">live</span>
        </div>
      </div>

      <div className="dashed-card">
        <div className="sec">Add Machine</div>
        <div className="field">
          <label>Machine Number / ID</label>
          <input type="text" placeholder="e.g. MC-01 or Line 3" value={newMachine}
            onChange={e=>setNewMachine(e.target.value)} autoCapitalize="characters"/>
        </div>
        <div className="field" style={{marginBottom:0}}>
          <label>Boxes Remaining <span style={{color:'#4b5563',fontWeight:400,textTransform:'none',fontSize:10}}>(time recorded automatically)</span></label>
          <input type="number" placeholder="e.g. 880" value={newBoxes1}
            onChange={e=>setNewBoxes1(e.target.value)} inputMode="numeric"/>
        </div>
      </div>

      <button className="btn" style={{marginBottom:14}} onClick={addMachine}>+ Add Machine</button>
      {formErr && <div className="err" style={{marginBottom:12}}>{formErr}</div>}

      {logs.length>0 && (
        <div className="top-bar">
          <span className="mc">{logs.length} machine{logs.length!==1?'s':''} tracked</span>
          <button className="btn btn-sm btn-red" onClick={resetAll}>Reset All</button>
        </div>
      )}

      <div className="log-list">
        {logs.map(log=>{
          const eta=getLatestETA(log);
          const isOpen=expanded===log.id;
          // compute whether countdown is done
          const isDone = eta && (getNowSec() >= eta.finishSec ||
            (eta.overnight && getNowSec() + 86400 >= eta.finishSec + 86400));

          return (
            <div key={log.id} className={`log-card${log.reason?' noted':''}${isDone?' done':''}`}>
              <div className="log-head" onClick={()=>setExpanded(isOpen?null:log.id)}>
                <div>
                  <div className="log-mid">{log.machineId}</div>
                  {log.reason && (
                    <div className={`note-badge ${log.reason}`} style={{marginTop:4}}>
                      {log.reason==='tool'?'🔧 Tool Change':'🔄 Material Change'}
                    </div>
                  )}
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>
                  {eta
                    ? <Countdown finishSec={eta.finishSec}/>
                    : <span className="log-eta dim">no ETA yet</span>
                  }
                  {eta && <span className={`log-eta${eta?'':' dim'}`} style={{fontSize:11}}>{eta.finishTime}</span>}
                  <span className={`chev${isOpen?' open':''}`}>▼</span>
                </div>
              </div>

              {isOpen && (
                <div className="log-body">

                  {/* Finish banner when countdown done */}
                  {eta && (
                    <FinishBanner finishSec={eta.finishSec} onRemove={()=>removeLog(log.id)}/>
                  )}

                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Finish Reason (optional)</div>
                    <div className="reason-row">
                      <button className={`rbtn tool${log.reason==='tool'?' on':''}`} onClick={()=>setReason(log.id,'tool')}>🔧 Tool Change</button>
                      <button className={`rbtn material${log.reason==='material'?' on':''}`} onClick={()=>setReason(log.id,'material')}>🔄 Material Change</button>
                    </div>
                  </div>

                  <div style={{marginBottom:13}}>
                    <div style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Update Boxes Remaining</div>
                    <div className="upd-row">
                      <input type="number" inputMode="numeric" placeholder="Current boxes remaining"
                        value={updInputs[log.id]||''}
                        onChange={e=>setUpdInputs(prev=>({...prev,[log.id]:e.target.value}))}
                        onKeyDown={e=>e.key==='Enter'&&doUpdate(log.id)}/>
                      <button className="btn btn-sm" style={{padding:'10px 16px'}} onClick={()=>doUpdate(log.id)}>Update</button>
                    </div>
                  </div>

                  <div className="hist-hdr"><span>Time</span><span>Boxes Left</span><span>ETA</span></div>
                  {[...log.history].reverse().map((h,i)=>(
                    <div className="hist-row" key={i}>
                      <span className="ht">{h.label}</span>
                      <span className="hb">{h.boxes} boxes</span>
                      <span className="he">{h.eta?h.eta.finishTime:'—'}</span>
                    </div>
                  ))}

                  {eta && (
                    <div className="stat-grid">
                      <div className="stat"><div className="slbl">Rate</div><div className="sval">{eta.rate.toFixed(1)}<span className="sunit">bx/hr</span></div></div>
                      <div className="stat"><div className="slbl">Time Left</div><div className="sval">{fmtDur(Math.max(0,eta.ttf))}</div></div>
                    </div>
                  )}
                  {eta?.overnight && <div style={{marginTop:8,fontSize:12,color:'#f97316',fontFamily:"'Share Tech Mono',monospace"}}>⚠ Finishes past midnight</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {logs.length===0 && <div className="empty">No machines tracked yet.<br/>Add one above to start.</div>}
    </React.Fragment>
  );
}

/* ── Finish Banner — shown inside card when countdown reaches 0 ── */
function FinishBanner({finishSec, onRemove}) {
  const [done, setDone] = useState(()=> getNowSec() >= finishSec);

  useEffect(()=>{
    if(done) return;
    const t=setInterval(()=>{
      if(getNowSec() >= finishSec) { setDone(true); clearInterval(t); }
    },1000);
    return ()=>clearInterval(t);
  },[finishSec]);

  if(!done) return null;

  return (
    <div className="finish-banner">
      <p>✓ Production complete for this machine</p>
      <button className="btn btn-green btn-sm" onClick={onRemove}>Mark as Finished &amp; Remove</button>
    </div>
  );
}

/* ── Pallet Tab ── */
function PalletTab() {
  const [ppb,setPpb]     = useState('');
  const [tp,setTp]       = useState('');
  const [result,setResult] = useState(null);
  const [error,setError]   = useState('');

  function calculate() {
    setResult(null); setError('');
    const p=parseFloat(ppb), t=parseFloat(tp);
    if(isNaN(p)||p<=0) return setError('⚠ Enter a valid number of parts per box');
    if(isNaN(t)||t<=0) return setError('⚠ Enter a valid total number of parts');
    const full=Math.floor(t/p), rem=t%p, total=rem>0?full+1:full;
    setResult({p,t,full,rem,total});
  }

  return (
    <React.Fragment>
      <div className="card">
        <div className="sec">Inputs</div>
        <div className="field">
          <label>Parts per Box</label>
          <input type="number" placeholder="e.g. 24" value={ppb} onChange={e=>setPpb(e.target.value)} inputMode="numeric"/>
        </div>
        <div className="field" style={{marginBottom:0}}>
          <label>Total Parts on Pallet</label>
          <input type="number" placeholder="e.g. 576" value={tp} onChange={e=>setTp(e.target.value)} inputMode="numeric"/>
        </div>
      </div>
      <button className="btn" onClick={calculate}>Calculate Boxes Needed</button>
      {error && <div className="err">{error}</div>}
      {result && (
        <div className="pal-res">
          <div className="sec" style={{color:'#60a5fa'}}>Result</div>
          <div className="pal-main">
            <div className="plbl">Boxes to Make</div>
            <div className="pval">{result.total}</div>
            <div className="punit">boxes needed for this pallet</div>
          </div>
          <div className="pal-grid">
            <div className="pstat"><div className="pslbl">Total Parts</div><div className="psval">{result.t}</div></div>
            <div className="pstat"><div className="pslbl">Parts per Box</div><div className="psval">{result.p}</div></div>
            <div className="pstat"><div className="pslbl">Full Boxes</div><div className="psval">{result.full}</div></div>
            <div className="pstat"><div className="pslbl">Leftover Parts</div><div className="psval">{result.rem}</div></div>
          </div>
          {result.rem>0
            ? <div className="remnote">⚠ Last box will have only {result.rem} part{result.rem>1?'s':''} (not full)</div>
            : <div className="remnote" style={{color:'#4ade80',borderColor:'#1a3a1a'}}>✓ All {result.total} boxes will be completely full</div>
          }
        </div>
      )}
    </React.Fragment>
  );
}

/* ── Regrind Tab ── */
const RG_SK   = 'regrind_logs_v1';
const RG_HASH = btoa('22222'); // simple obfuscation — not cryptographic

function loadRgLogs(){try{const r=localStorage.getItem(RG_SK);return r?JSON.parse(r):[]}catch{return[]}}
function saveRgLogs(l){try{localStorage.setItem(RG_SK,JSON.stringify(l))}catch{}}

function PinOverlay({onUnlock,onCancel}) {
  const [pin,setPin]   = useState('');
  const [err,setErr]   = useState('');
  function check() {
    if(btoa(pin)===RG_HASH){ onUnlock(); }
    else{ setErr('Incorrect password'); setPin(''); }
  }
  return (
    <div className="pin-overlay">
      <div className="pin-box">
        <div className="pin-title">Regrind Log</div>
        <div className="pin-sub">Enter password to view logs</div>
        <input className="pin-input" type="password" placeholder="•••••" value={pin}
          onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&check()} autoFocus/>
        <div className="pin-err">{err}</div>
        <button className="btn" style={{marginBottom:10}} onClick={check}>Unlock</button>
        <button className="btn btn-red btn-sm" style={{margin:'0 auto'}} onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

function RegrindTab() {
  const [machineId,setMachineId] = useState('');
  const [productCode,setProductCode] = useState('');
  const [sprue,setSprue]   = useState('');
  const [parts,setParts]   = useState('');
  const [error,setError]   = useState('');
  const [logs,setLogs]     = useState(loadRgLogs);
  const [showLog,setShowLog]   = useState(false);
  const [unlocked,setUnlocked] = useState(false);
  const [showPin,setShowPin]   = useState(false);

  function saveEntry() {
    setError('');
    const mid = machineId.trim().toUpperCase();
    const pc  = productCode.trim().toUpperCase();
    const s   = parseFloat(sprue);
    const p   = parseFloat(parts);
    if(!mid)           return setError('⚠ Enter a machine ID');
    if(!pc)            return setError('⚠ Enter a product code');
    if(isNaN(s)||s<=0) return setError('⚠ Enter a valid sprue weight');
    if(isNaN(p)||p<=0) return setError('⚠ Enter a valid parts weight');
    const pct = (s/(s+p))*100;
    const now = new Date();
    const timestamp = [now.getDate(),now.getMonth()+1,now.getFullYear()].map(x=>String(x).padStart(2,'0')).join('/') +
      ' ' + [now.getHours(),now.getMinutes()].map(x=>String(x).padStart(2,'0')).join(':');
    const entry = {id:Date.now(), machineId:mid, productCode:pc, sprue:s, parts:p,
      total:parseFloat((s+p).toFixed(2)), pct:pct.toFixed(1), timestamp};
    const updated = [entry,...logs];
    setLogs(updated); saveRgLogs(updated);
    setMachineId(''); setProductCode(''); setSprue(''); setParts('');
  }

  function exportCSV() {
    const header = 'Timestamp,Machine ID,Product Code,Sprue (g),Parts (g),Total (g),Regrind %\n';
    const rows = logs.map(l=>
      `${l.timestamp},${l.machineId},${l.productCode},${l.sprue},${l.parts},${l.total},${l.pct}%`
    ).join('\n');
    const blob = new Blob([header+rows],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='regrind-log.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function deleteLog(id) {
    if(!window.confirm('Delete this entry?')) return;
    const updated = logs.filter(l=>l.id!==id);
    setLogs(updated); saveRgLogs(updated);
  }

  function openLog() {
    if(unlocked) setShowLog(true);
    else setShowPin(true);
  }

  return (
    <React.Fragment>
      {showPin && (
        <PinOverlay
          onUnlock={()=>{setUnlocked(true);setShowPin(false);setShowLog(true);}}
          onCancel={()=>setShowPin(false)}
        />
      )}

      <div className="card">
        <div className="sec">New Entry</div>
        <div className="field">
          <label>Machine ID</label>
          <input type="text" placeholder="e.g. MC-01" value={machineId}
            onChange={e=>setMachineId(e.target.value)} autoCapitalize="characters"/>
        </div>
        <div className="field">
          <label>Product Code</label>
          <input type="text" placeholder="e.g. PRD-442" value={productCode}
            onChange={e=>setProductCode(e.target.value)} autoCapitalize="characters"/>
        </div>
        <div className="field">
          <label>Sprue Weight (grams)</label>
          <input type="number" placeholder="e.g. 12.5" value={sprue}
            onChange={e=>setSprue(e.target.value)} inputMode="decimal" step="0.1"/>
        </div>
        <div className="field" style={{marginBottom:0}}>
          <label>Parts Weight (grams)</label>
          <input type="number" placeholder="e.g. 87.5" value={parts}
            onChange={e=>setParts(e.target.value)} inputMode="decimal" step="0.1"/>
        </div>
      </div>

      <button className="btn" style={{marginBottom:10}} onClick={saveEntry}>Save Entry</button>
      {error && <div className="err" style={{marginBottom:10}}>{error}</div>}

      <button className="btn" style={{marginBottom:14,background:'#134e4a',maxWidth:480}} onClick={openLog}>
        📋 View Log ({logs.length} entries)
      </button>

      {showLog && unlocked && (
        <React.Fragment>
          {logs.length>0 && (
            <div className="rg-topbar">
              <span className="rg-count">{logs.length} entr{logs.length!==1?'ies':'y'}</span>
              <button className="export-btn" onClick={exportCSV}>⬇ Export CSV</button>
            </div>
          )}
          {logs.length===0 && (
            <div className="empty" style={{color:'#4b8a85'}}>No entries saved yet.</div>
          )}
          {logs.map(l=>(
            <div className="rg-log-card" key={l.id}>
              <div className="rg-log-header">
                <div>
                  <div className="rg-log-id">{l.machineId} · {l.productCode}</div>
                  <div className="rg-log-time">{l.timestamp}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="rg-log-pct">{l.pct}<span>%</span></div>
                  <button onClick={()=>deleteLog(l.id)}
                    style={{background:'transparent',border:'none',color:'#7f1d1d',fontSize:16,cursor:'pointer',padding:'2px 6px'}}>✕</button>
                </div>
              </div>
              <div className="rg-log-meta">
                <div className="rg-log-item"><div className="rg-log-lbl">Sprue</div><div className="rg-log-val">{l.sprue}g</div></div>
                <div className="rg-log-item"><div className="rg-log-lbl">Parts</div><div className="rg-log-val">{l.parts}g</div></div>
                <div className="rg-log-item"><div className="rg-log-lbl">Total</div><div className="rg-log-val">{l.total}g</div></div>
                <div className="rg-log-item"><div className="rg-log-lbl">Regrind</div><div className="rg-log-val">{l.pct}%</div></div>
              </div>
              <div className="rg-log-formula">{l.sprue}g ÷ ({l.sprue}g + {l.parts}g) × 100 = {l.pct}%</div>
            </div>
          ))}
        </React.Fragment>
      )}
    </React.Fragment>
  );
}

/* ── Main App ── */
function App() {
  const [tab,setTab] = useState('eta');
  return (
    <div className="app">
      <div className="header">
        <div className="header-label">Factory Floor Tool</div>
        <h1>Production Calculator</h1>
      </div>
      <div className="tabs">
        <button className={`tab${tab==='eta'?' active':''}`} onClick={()=>setTab('eta')}>
          <span className="tab-icon">⏱</span>ETA
        </button>
        <button className={`tab${tab==='pallet'?' active':''}`} onClick={()=>setTab('pallet')}>
          <span className="tab-icon">📦</span>Pallet
        </button>
        <button className={`tab${tab==='regrind'?' active':''}`} onClick={()=>setTab('regrind')}>
          <span className="tab-icon">♻️</span>Regrind
        </button>
      </div>
      {tab==='eta'     && <ETATab/>}
      {tab==='pallet'  && <PalletTab/>}
      {tab==='regrind' && <RegrindTab/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
